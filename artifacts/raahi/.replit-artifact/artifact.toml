kind = "web"
previewPath = "/"
title = "Raahi — Business OS for Indian SMBs"
version = "1.0.0"
id = "artifacts/raahi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20907

[services.development]
run = "pnpm --filter @workspace/raahi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/raahi", "run", "build" ]
publicDir = "artifacts/raahi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20907"
BASE_PATH = "/"
